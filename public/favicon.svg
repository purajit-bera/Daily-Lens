    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0" />
